root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -tags dev -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  delay = 500
  exclude_dir = ["tmp", "data", ".beads", ".git", ".ralph"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "html", "sql"]
  kill_delay = 500

[log]
  time = false

[misc]
  clean_on_exit = true
